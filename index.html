<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lucky 7 Casino</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}
body{
    background:linear-gradient(135deg,#0f172a,#1e293b);
    color:white;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}
.container{
    width:100%;
    max-width:700px;
    background:#111827;
    border-radius:20px;
    padding:25px;
    box-shadow:0 0 40px rgba(0,0,0,.5);
}
h1{
    text-align:center;
    margin-bottom:15px;
    color:#facc15;
}
.stats{
    display:flex;
    justify-content:space-between;
    margin-bottom:20px;
    flex-wrap:wrap;
    gap:10px;
}
.card{
    flex:1;
    min-width:140px;
    background:#1f2937;
    padding:12px;
    border-radius:12px;
    text-align:center;
}
.slot{
    display:flex;
    justify-content:center;
    gap:15px;
    margin:25px 0;
}
.reel{
    width:120px;
    height:120px;
    background:#0b1220;
    border:4px solid #374151;
    border-radius:15px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:60px;
    transition:.15s;
}
.controls{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}
input{
    flex:1;
    min-width:120px;
    padding:12px;
    border:none;
    border-radius:10px;
    font-size:18px;
}
button{
    flex:1;
    min-width:120px;
    padding:12px;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
    font-weight:bold;
}
.spin{
    background:#22c55e;
}
.max{
    background:#3b82f6;
    color:white;
}
.reset{
    background:#ef4444;
    color:white;
}
#message{
    text-align:center;
    margin-top:20px;
    font-size:22px;
    font-weight:bold;
    min-height:40px;
}
.win{
    color:#4ade80;
}
.lose{
    color:#f87171;
}
</style>
</head>
<body>

<div class="container">
    <h1>🎰 Lucky 7 Casino</h1>

    <div class="stats">
        <div class="card">
            <div>Balance</div>
            <h2 id="balance">$1000</h2>
        </div>

        <div class="card">
            <div>Wins</div>
            <h2 id="wins">0</h2>
        </div>

        <div class="card">
            <div>Streak</div>
            <h2 id="streak">0</h2>
        </div>
    </div>

    <div class="slot">
        <div class="reel" id="r1">🍒</div>
        <div class="reel" id="r2">🍋</div>
        <div class="reel" id="r3">🍀</div>
    </div>

    <div class="controls">
        <input id="bet" type="number" value="25" min="1">
        <button class="spin" onclick="spin()">SPIN</button>
        <button class="max" onclick="maxBet()">MAX BET</button>
        <button class="reset" onclick="resetGame()">RESET</button>
    </div>

    <div id="message"></div>
</div>

<script>
const symbols = [
    "🍒","🍋","🍉","🍀","⭐","💎","7️⃣"
];

let balance = 1000;
let wins = 0;
let streak = 0;

const balanceEl = document.getElementById("balance");
const winsEl = document.getElementById("wins");
const streakEl = document.getElementById("streak");
const msg = document.getElementById("message");

function updateUI(){
    balanceEl.textContent = "$" + balance;
    winsEl.textContent = wins;
    streakEl.textContent = streak;
}

function beep(freq,duration){
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();

    osc.frequency.value = freq;
    osc.type = "sine";

    osc.connect(gain);
    gain.connect(ctx.destination);

    gain.gain.value = 0.05;

    osc.start();

    setTimeout(()=>{
        osc.stop();
        ctx.close();
    },duration);
}

function randSymbol(){
    return symbols[Math.floor(Math.random()*symbols.length)];
}

async function spin(){

    const bet = parseInt(document.getElementById("bet").value);

    if(isNaN(bet) || bet <= 0){
        alert("Enter a valid bet.");
        return;
    }

    if(bet > balance){
        alert("Not enough balance.");
        return;
    }

    balance -= bet;
    updateUI();

    for(let i=0;i<18;i++){

        document.getElementById("r1").textContent = randSymbol();
        document.getElementById("r2").textContent = randSymbol();
        document.getElementById("r3").textContent = randSymbol();

        await new Promise(r=>setTimeout(r,60));
    }

    /*
       Approximate RTP ~94%
       Better feeling gameplay:
       - occasional near misses
       - larger jackpots
    */

    let a,b,c;
    const roll = Math.random();

    if(roll < 0.05){
        a=b=c="7️⃣";
    }
    else if(roll < 0.15){
        a=b=c=randSymbol();
    }
    else if(roll < 0.35){
        a=b=randSymbol();
        c=randSymbol();
    }
    else{
        a=randSymbol();
        b=randSymbol();
        c=randSymbol();
    }

    document.getElementById("r1").textContent = a;
    document.getElementById("r2").textContent = b;
    document.getElementById("r3").textContent = c;

    let payout = 0;

    if(a===b && b===c){

        if(a==="7️⃣"){
            payout = bet * 20;
        }
        else if(a==="💎"){
            payout = bet * 12;
        }
        else{
            payout = bet * 6;
        }

    }else if(a===b || b===c || a===c){
        payout = bet * 2;
    }

    if(payout > 0){
        balance += payout;
        wins++;
        streak++;

        msg.className = "win";
        msg.textContent =
            `WIN! +$${payout}`;

        beep(700,120);
        setTimeout(()=>beep(900,120),120);

    }else{

        streak = 0;

        msg.className = "lose";
        msg.textContent = `Lost $${bet}`;

        beep(220,180);
    }

    if(balance <= 0){
        msg.className = "lose";
        msg.textContent =
            "GAME OVER — Press RESET";
    }

    updateUI();
}

function maxBet(){
    document.getElementById("bet").value =
        Math.max(1, Math.floor(balance * 0.25));
}

function resetGame(){
    balance = 1000;
    wins = 0;
    streak = 0;

    document.getElementById("r1").textContent="🍒";
    document.getElementById("r2").textContent="🍋";
    document.getElementById("r3").textContent="🍀";

    msg.textContent="";
    updateUI();
}

updateUI();
</script>

</body>
</html>
